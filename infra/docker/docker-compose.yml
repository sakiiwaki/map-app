version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: favorite_map_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MCP Server ───────────────────────────────────────
  mcp-server:
    build:
      context: ../../apps/mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/favorite_map_db
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
